<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Надя — Кампейн директор</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #fffbf5;
        font-family: "Manrope", sans-serif;
      }

      .container {
        margin: 0 auto;
        padding-left: 6vw;
        padding-right: 6vw;
      }

      /* 12-колоночная сетка */
      .row {
        display: flex;
        gap: 24px;
        flex-wrap: wrap;
      }

      .col-5 {
        width: calc(41.666% - 12px);
      }
      .col-7 {
        width: calc(58.333% - 12px);
      }

      /* градиентный текст — увеличен line-height */
      .gradient-text {
        background: linear-gradient(135deg, #6d3aff 0%, #ff9e2c 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        display: inline-block;
        line-height: 1.3;
        padding: 4px 0;
      }

      /* строка "Привет! Меня зовут" */
      .hero-greeting {
        font-size: 24px;
        font-weight: 500;
        color: #6d3aff;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        margin-bottom: 16px;
      }

      /* имя НАДЯ отдельной строкой */
      .hero-name {
        font-size: 82px;
        font-weight: 800;
        color: #493f55;
        text-transform: uppercase;
        line-height: 1.2;
        margin-bottom: 24px;
        letter-spacing: -0.02em;
        padding: 4px 0;
      }

      /* вторая строка — Кампейн директор (в одну строку) */
      .hero-title {
        font-size: 82px;
        font-weight: 800;
        text-transform: uppercase;
        line-height: 1.2;
        margin-bottom: 40px;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 12px;
      }

      .hero-title .normal {
        font-weight: 800;
        font-style: normal;
        display: inline-block;
        line-height: 1.1;
        padding: 4px 0;
      }

      .hero-title .italic {
        font-family: "Manrope", sans-serif;
        font-weight: 800;
        font-style: italic;
        color: #ff9e2c;
        text-transform: uppercase;
        letter-spacing: -0.01em;
        display: inline-block;
        line-height: 1.1;
        padding: 4px 0;
      }

      /* подзаголовок */
      .hero-subhead {
        font-size: 20px;
        font-weight: 600;
        color: #6d3aff;
        text-transform: uppercase;
        letter-spacing: 0.02em;
        line-height: 1.4;
        margin-bottom: 48px;
      }

      /* кнопка основная */
      .btn-primary {
        display: inline-block;
        background-color: #ff9e2c;
        color: #fffbf5;
        font-family: "Manrope", sans-serif;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        text-decoration: none;
        padding: 16px 36px;
        border-radius: 40px;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
        letter-spacing: 0.05em;
      }

      .btn-primary:hover {
        background-color: #e88a1a;
        transform: scale(1.02);
      }

      /* навигация */
      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 28px 0;
        border-bottom: 1px solid rgba(73, 63, 85, 0.08);
        flex-wrap: wrap;
        gap: 20px;
      }

      .nav-links {
        display: flex;
        gap: 40px;
        list-style: none;
        flex-wrap: wrap;
      }

      .nav-links a {
        font-size: 13px;
        font-weight: 500;
        color: #493f55;
        text-transform: uppercase;
        text-decoration: none;
        letter-spacing: 0.05em;
        transition: color 0.3s ease;
      }

      .nav-links a:hover {
        color: #6d3aff;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 28px;
      }

      .phone-number {
        font-size: 13px;
        font-weight: 600;
        color: #493f55;
        text-decoration: none;
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      .btn-calc {
        background-color: transparent;
        border: 1px solid #ff9e2c;
        color: #ff9e2c;
        font-family: "Manrope", sans-serif;
        font-size: 13px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 10px 24px;
        border-radius: 40px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn-calc:hover {
        background-color: #ff9e2c;
        color: #fffbf5;
      }

      /* Hero секция — ровно на всю высоту */
      .hero {
        height: calc(100vh - 90px);
        display: flex;
        align-items: center;
      }

      /* фото — без фона */
      .hero-photo {
        border-radius: 32px;
        width: 100%;
        height: auto;
        object-fit: cover;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
      }

      .photo-placeholder {
        width: 100%;
        border-radius: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* адаптив для мобильных */
      @media (max-width: 1024px) {
        .container {
          padding-left: 4vw;
          padding-right: 4vw;
        }

        .hero-name,
        .hero-title {
          font-size: 56px;
        }

        .hero-greeting {
          font-size: 18px;
        }

        .hero-title .italic {
          font-size: 56px;
        }
      }

      @media (max-width: 768px) {
        .col-5,
        .col-7 {
          width: 100%;
        }

        .hero {
          height: auto;
          padding: 40px 0 60px 0;
        }

        .hero-name,
        .hero-title {
          font-size: 42px;
        }

        .hero-title .italic {
          font-size: 42px;
        }

        .hero-greeting {
          font-size: 16px;
        }

        .hero-subhead {
          font-size: 16px;
        }

        .nav-links {
          gap: 20px;
        }

        .navbar {
          flex-direction: column;
          align-items: flex-start;
        }

        .nav-right {
          flex-wrap: wrap;
        }
      }

      @media (max-width: 480px) {
        .hero-name,
        .hero-title {
          font-size: 32px;
        }

        .hero-title .italic {
          font-size: 32px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <!-- Меню -->
      <nav class="navbar">
        <ul class="nav-links">
          <li><a href="#">Кампейн</a></li>
          <li><a href="#">Как это работает</a></li>
          <li><a href="#">Оффер</a></li>
          <li><a href="#">Обо мне</a></li>
          <li><a href="#">Контакты</a></li>
        </ul>
        <div class="nav-right">
          <a href="tel:+71234567890" class="phone-number">+7 (123) 456-78-90</a>
          <button class="btn-calc">Калькулятор кампании</button>
        </div>
      </nav>

      <!-- Hero секция — ровно на всю высоту -->
      <section class="hero">
        <div class="row" style="align-items: center; width: 100%">
          <!-- Левая колонка на 5 колонок под фото -->
          <div class="col-5">
            <div class="photo-placeholder">
              <img
                src="https://placehold.co/800x1000/FFFBF5/493F55?text=ФОТО+НАДИ"
                alt="Надя, кампейн директор"
                class="hero-photo"
              />
            </div>
          </div>

          <!-- Правая колонка на 7 колонок с текстом -->
          <div class="col-7">
            <!-- Привет! Меня зовут -->
            <div class="hero-greeting">ПРИВЕТ! МЕНЯ ЗОВУТ</div>

            <!-- Имя НАДЯ отдельной строкой -->
            <div class="hero-name">НАДЯ,</div>

            <!-- Кампейн директор (в одну строку) -->
            <div class="hero-title">
              <span class="hero-name">Я — </span>
              <span class="normal gradient-text">КАМПЕЙН</span>
              <span class="italic">ДИРЕКТОР</span>
            </div>

            <!-- Подзаголовок -->
            <div class="hero-subhead">
              ПРЕВРАТИЛА ХАОС НАЙМА SMM И СМЕНЫ ПОДРЯДЧИКОВ<br />
              В СИСТЕМУ ПРОДАЮЩИХ СПРИНТОВ
            </div>

            <a href="#" class="btn-primary">ХОЧУ ПОТОК ЗАЯВОК →</a>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
